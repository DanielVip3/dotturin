services:
  minio:
    image: minio/minio:latest
    container_name: s3
    ports:
      - "9000:9000" # API port
      - "9001:9001" # web UI port
    environment:
      MINIO_ROOT_USER: rootuser
      MINIO_ROOT_PASSWORD: rootpassword123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REREPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      KAFKA_MESSAGE_MAX_BYTES: 10485760
      CLUSTER_ID: 'kmJjTkTbQQ2UhU4nA2CRDQ'

  # Init container to initialize Kafka topic before running consumer in Spark
  kafka-init-topics:
    image: confluentinc/cp-kafka:latest
    depends_on:
      kafka:
        condition: service_started
    command: [ "/bin/bash", "-c", "/create_topic.sh"]
    environment:
      - TOPIC_NAME=dotturin-bike-status
    volumes:
      - type: bind
        source: ./create_topic.sh
        target: /create_topic.sh
    init: true

  spark:
    image: apache/spark
    container_name: spark
    user: root
    depends_on:
      - kafka-init-topics
      - minio
    ports:
      - "4040:4040" # web UI port
    volumes:
      - .:/app
      - ./spark_dependencies/.ivy2:/app/spark_dependencies/.ivy2
    working_dir: /app
    command: >
      /opt/spark/bin/spark-submit
      --conf "spark.driver.extraJavaOptions=-Divy.home=/app/spark_dependencies/.ivy2"
      --conf "spark.executor.extraJavaOptions=-Divy.home=/app/spark_dependencies/.ivy2"
      --packages org.apache.spark:spark-sql-kafka-0-10_2.13:4.1.2,org.apache.hadoop:hadoop-aws:3.4.0,com.amazonaws:aws-java-sdk-bundle:1.12.262 
      /app/scripts/consumer.py

volumes:
  minio_data: