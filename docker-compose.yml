x-airflow-common:
  &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
    target: airflow
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__CORE__AUTH_MANAGER: 'airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth'
    AIRFLOW__API__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_SECRET_KEY}
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-api-server:8080/execution/'
    AIRFLOW_CONN_SPARK_DEFAULT: 'spark://spark-master:7077'
    MINIO_ROOT_USER: ${MINIO_ROOT_USER}
    MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    CLICKHOUSE_USER: ${CLICKHOUSE_USER}
    CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    CLICKHOUSE_DB: ${CLICKHOUSE_DB}
    TWITCH_CLIENT_ID: ${TWITCH_CLIENT_ID}
    TWITCH_CLIENT_SECRET: ${TWITCH_CLIENT_SECRET}
    TOPIC_STREAMS: ${TOPIC_STREAMS}
    TOPIC_GAMES: ${TOPIC_GAMES}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./scripts:/opt/airflow/scripts
    - ./soda:/opt/soda
  user: "${AIRFLOW_UID}:0"
  networks:
    - pipeline_net
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16
    container_name: postgres-airflow
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pipeline_net
 
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username "${AIRFLOW_WEB_USER}" \
          --firstname "${AIRFLOW_WEB_FIRSTNAME}" \
          --lastname "${AIRFLOW_WEB_LASTNAME}" \
          --role Admin \
          --email "${AIRFLOW_WEB_EMAIL}" \
          --password "${AIRFLOW_WEB_PASSWORD}"
    environment:
      <<: *airflow-common-env

  airflow-api-server:
    <<: *airflow-common
    container_name: airflow-api-server
    command: api-server
    ports:
      - "8080:8080"
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully
  
  airflow-dag-processor:
    <<: *airflow-common
    container_name: airflow-dag-processor
    command: dag-processor
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  minio:
    image: minio/minio:latest
    container_name: s3
    ports:
      - "9000:9000" # API port
      - "9001:9001" # web UI port
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - pipeline_net

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REREPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      KAFKA_MESSAGE_MAX_BYTES: 10485760
      CLUSTER_ID: 'kmJjTkTbQQ2UhU4nA2CRDQ'
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - pipeline_net

  # Init container to initialize Kafka topics before running consumer in Spark
  kafka-init-topics:
    image: confluentinc/cp-kafka:latest
    depends_on:
      kafka:
        condition: service_started
    command: >
      /bin/bash -c "
      /create_topic.sh "${TOPIC_STREAMS}" && 
      /create_topic.sh "${TOPIC_GAMES}"
      "
    volumes:
      - type: bind
        source: ./create_topic.sh
        target: /create_topic.sh
    init: true
    networks:
      - pipeline_net

  spark-master:
    build:
      context: .
      dockerfile: Dockerfile
      target: spark
    container_name: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    volumes:
      - ./soda:/opt/soda
    environment:
      SPARK_MODE: 'master'
      SPARK_PUBLIC_DNS: 'spark-master'
      SPARK_LOCAL_IP: 'spark-master'
    ports:
      - "7077:7077"
      - "8081:8080"
    networks:
      - pipeline_net

  spark-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: spark
    container_name: spark-worker
    depends_on:
      - spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    volumes:
      - ./soda:/opt/soda
    environment:
      SPARK_MODE: 'worker'
      SPARK_PUBLIC_DNS: 'spark-worker'
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      TOPIC_STREAMS: ${TOPIC_STREAMS}
      TOPIC_GAMES: ${TOPIC_GAMES}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
    ports:
      - "8082:8081"
    networks:
      - pipeline_net
  
  # Init container to run bronze and silver jobs in Spark Streaming
  spark-stream-init:
    build:
      context: .
      dockerfile: Dockerfile
      target: spark
    depends_on:
      - spark-master
      - spark-worker
      - kafka
      - kafka-init-topics
      - minio
    volumes:
      - ./scripts:/app/jobs
      - ./spark_submit_jobs.sh:/app/spark_submit_jobs.sh
    environment:
      SPARK_APP_CORES: ${SPARK_APP_CORES}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      TOPIC_STREAMS: ${TOPIC_STREAMS}
      TOPIC_GAMES: ${TOPIC_GAMES}
    working_dir: /app
    command: bash spark_submit_jobs.sh
    restart: unless-stopped
    networks:
      - pipeline_net
  
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse
    ports:
      - "8123:8123"   # HTTP interface
      - "9005:9000"   # Native interface
      - "9004:9004"   # MySQL emulation interface (used by Soda)
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/init:/docker-entrypoint-initdb.d
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - pipeline_net

volumes:
  minio_data:
  kafka_data:
  postgres_data:
  clickhouse_data:

networks:
  pipeline_net:
    driver: bridge